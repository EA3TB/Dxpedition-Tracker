<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXpedition Tracker</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1b2a;
  --bg2:       #112233;
  --bg3:       #0a1520;
  --card-bg:   #0f1e30;
  --card-bdr:  #1e6eb5;
  --acc:       #1e8bd4;
  --acc2:      #155e99;
  --text:      #d8e8f5;
  --text2:     #7a9ab8;
  --text3:     #3a5a78;
  --sep:       #1a2e45;
  --sep2:      #0d1e30;
  --ibg:       #08121e;
  --cell-e:    #0a1828;
  --cell-et:   #2a4a6a;
  --conf-bg:   #3d0a0a;
  --conf-t:    #ff7070;
  --work-bg:   #0a2e14;
  --work-t:    #50d870;
  --new-bg:    #ffffff;
  --new-t:     #111111;
  --dis-bg:    #070e16;
  --dis-t:     #1a2e3a;
  --utc:       #f0c040;
  --local:     #80c8ff;
  --hdr-h:     56px;
}

.light {
  --bg:        #e8edf3;
  --bg2:       #f5f7fa;
  --bg3:       #dde3ec;
  --card-bg:   #ffffff;
  --card-bdr:  #2563ab;
  --acc:       #2563ab;
  --acc2:      #1a4a85;
  --text:      #1a2535;
  --text2:     #4a6a8a;
  --text3:     #9ab0c8;
  --sep:       #c8d8e8;
  --sep2:      #dde6f0;
  --ibg:       #eef2f8;
  --cell-e:    #f5f7fa;
  --cell-et:   #9ab0c8;
  --conf-bg:   #fde8e8;
  --conf-t:    #991b1b;
  --work-bg:   #e0fae8;
  --work-t:    #145c2a;
  --new-bg:    #ffffff;
  --new-t:     #111111;
  --dis-bg:    #eaedf0;
  --dis-t:     #c8d0da;
  --utc:       #9a6000;
  --local:     #1a50a0;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  line-height: 1.4;
}

/* ===== TOPBAR ===== */
#topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg2);
  border-bottom: 1px solid var(--sep);
  height: var(--hdr-h);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
}

#topbar .title {
  font-size: 18px;
  font-weight: 600;
  color: var(--acc);
  letter-spacing: .5px;
  white-space: nowrap;
  flex-shrink: 0;
}

#topbar .clocks {
  display: flex;
  gap: 20px;
  flex-shrink: 0;
}

#topbar .clk { text-align: center; }
#topbar .clk-lbl { font-size: 10px; color: var(--text2); }
#topbar .clk-val { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; }
#topbar .clk-val.utc { color: var(--utc); }
#topbar .clk-val.loc { color: var(--local); }

#topbar .spacer { flex: 1; }

#topbar .status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #444; flex-shrink: 0;
  transition: background .3s;
}
#topbar .status-dot.ok   { background: #40d860; }
#topbar .status-dot.warn { background: #f0a020; }
#topbar .status-dot.err  { background: #e04040; }

#topbar .status-label { font-size: 11px; color: var(--text2); white-space: nowrap; }

.btn {
  border: 1px solid var(--sep);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: background .15s, opacity .15s;
  font-family: inherit;
}
.btn:hover { opacity: .85; }
.btn-ghost { background: var(--ibg); color: var(--text2); }
.btn-accent { background: var(--acc); border-color: var(--acc2); color: #fff; font-weight: 600; }
.btn-sm { padding: 3px 9px; font-size: 11px; }
.btn-danger { background: #3d0a0a; border-color: #7a1a1a; color: #ff7070; }

/* ===== SUBBAR ===== */
#subbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--sep);
  padding: 6px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.field-group { display: flex; align-items: center; gap: 5px; }
.field-group label { font-size: 11px; color: var(--text2); white-space: nowrap; }

input[type="text"] {
  background: var(--ibg);
  border: 1px solid var(--sep);
  color: var(--text);
  border-radius: 5px;
  padding: 4px 8px;
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color .2s;
}
input[type="text"]:focus { border-color: var(--acc); }

#xml-path-input { width: 320px; }

/* CTY status (ahora integrado en subbar) */
.cty-badge {
  border-radius: 3px;
  padding: 1px 8px;
  font-size: 10px;
  font-weight: 600;
}
.cty-badge.ok   { background: var(--work-bg);  color: var(--work-t); }
.cty-badge.warn { background: #2a1a00; color: #f0a020; }
.cty-badge.err  { background: var(--conf-bg);  color: var(--conf-t); }

/* ===== BODY / GRID ===== */
#body { padding: 14px 12px 24px; }

#grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 14px;
}

/* ===== CARD ===== */
.card {
  background: var(--card-bg);
  border: 1.5px solid var(--card-bdr);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.card-hdr {
  background: var(--acc);
  padding: 7px 9px;
  display: flex;
  align-items: center;
  gap: 7px;
}

.card-call-input {
  text-align: center;
  flex: 1;
  min-width: 0;
  background: rgba(255,255,255,.14);
  border: 1px solid rgba(255,255,255,.28);
  color: #fff;
  border-radius: 5px;
  padding: 4px 8px;
  font-size: 15px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  outline: none;
  font-family: 'Courier New', monospace;
  transition: background .2s;
}
.card-call-input:focus { background: rgba(255,255,255,.22); }
.card-call-input::placeholder { color: rgba(255,255,255,.45); font-weight: 400; letter-spacing: 0; }

.card-reload {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.8);
  border-radius: 5px;
  width: 26px; height: 26px;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  flex-shrink: 0;
}
.card-reload:hover { background: rgba(255,255,255,.22); }

.card-dxspots {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.8);
  border-radius: 5px;
  width: 26px; height: 26px;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  flex-shrink: 0;
}
.card-dxspots:hover { background: rgba(255,255,255,.22); }

#dxspots-popup {
  position: fixed;
  z-index: 500;
  background: var(--ibg);
  border: 1px solid var(--acc);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  width: 340px;
  max-height: 360px;
  overflow-y: auto;
  display: none;
  font-size: 11px;
}
#dxspots-popup .dxspots-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid var(--sep);
  position: sticky; top: 0;
  background: var(--ibg);
}
#dxspots-popup .dxspots-hdr span.title { color: var(--text); font-weight: 600; }
#dxspots-popup .dxspots-hdr span.close { color: var(--text2); cursor: pointer; font-size: 14px; padding: 0 4px; }
#dxspots-popup table { width: 100%; border-collapse: collapse; }
#dxspots-popup th { text-align: left; color: var(--text2); padding: 4px 8px; font-weight: 500; }
#dxspots-popup td { padding: 3px 8px; border-top: 1px solid var(--sep); color: var(--text); white-space: nowrap; }
#dxspots-popup td.obs { white-space: normal; color: var(--text2); }
#dxspots-popup .dxspots-msg { padding: 12px; color: var(--text2); text-align: center; }


.card-close {
  background: rgba(0,0,0,.25);
  border: none;
  color: rgba(255,255,255,.85);
  border-radius: 50%;
  width: 24px; height: 24px;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.card-close:hover { background: rgba(180,0,0,.5); }

.card-country {
  text-align: center;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 9px;
  background: var(--ibg);
  border-bottom: 1px solid var(--sep);
  font-size: 11px;
  min-height: 24px;
}
.card-country .cname { font-weight: 600; color: var(--text); font-size: 12px; }
.card-country .czones { color: var(--text2); font-size: 10px; }

.card-geo {
  display: flex;
  padding: 5px 6px;
  gap: 2px;
  border-bottom: 1px solid var(--sep);
  background: var(--ibg);
}
.geo-item { flex: 1; text-align: center; }
.geo-lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
.geo-val { font-size: 14px; font-weight: 700; }
.geo-val.sp   { color: #60b0ff; }
.geo-val.lp   { color: #f0a060; }
.geo-val.dist { color: #50d880; }

/* ===== TABLE ===== */
.dx-table {
  width: 100%;
  border-collapse: collapse;
  flex: 1;
}
.dx-table th {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  padding: 5px 2px;
  text-align: center;
  border-bottom: 1px solid var(--sep);
  background: var(--ibg);
  letter-spacing: .3px;
}
.dx-table td {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  padding: 5px 2px;
  border: 1px solid var(--sep);
  cursor: pointer;
  user-select: none;
  position: relative;
  transition: filter .1s;
}
.dx-table td:hover:not(.s-disabled) { filter: brightness(1.15); }

/* States */
.s-empty    { background: var(--cell-e);  color: var(--cell-et); }
.s-worked   { background: var(--work-bg); color: var(--work-t);  cursor: pointer; }
.s-confirmed{ background: var(--conf-bg); color: var(--conf-t);  cursor: pointer; }
.s-new      { background: var(--new-bg);  color: var(--new-t);   cursor: pointer; }
.s-disabled { background: var(--dis-bg);  color: var(--dis-t);   cursor: not-allowed; opacity: .4; }

.badge { font-size: 11px; font-weight: 800; margin-left: 1px; }

.xover {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 22px;
  font-weight: 300;
  opacity: .4;
  pointer-events: none;
  line-height: 1;
  color: #111;
}

/* ===== EMPTY PLACEHOLDER CARD ===== */
.card-add {
  background: var(--card-bg);
  border: 1.5px dashed var(--sep);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 260px;
  cursor: pointer;
  opacity: .5;
  transition: opacity .2s, border-color .2s;
  gap: 8px;
}
.card-add:hover { opacity: .85; border-color: var(--acc); }
.card-add-icon { font-size: 32px; color: var(--text2); }
.card-add-lbl  { font-size: 13px; color: var(--text2); }

/* ===== LEGEND ===== */
#legend {
  display: flex;
  gap: 18px;
  align-items: center;
  margin-top: 14px;
  padding: 8px 6px;
  border-top: 1px solid var(--sep);
  flex-wrap: wrap;
}
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.leg-sw {
  width: 34px; height: 18px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800;
}

/* ===== MODAL / OVERLAY ===== */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--sep);
  border-radius: 10px;
  padding: 20px;
  width: 520px;
  max-width: 95vw;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.modal h2 { font-size: 15px; font-weight: 600; color: var(--text); }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; }
#browser-frame {
  flex: 1;
  border: 1px solid var(--sep);
  border-radius: 6px;
  background: #0a1828;
  min-height: 340px;
}

/* ===== WARNING MODAL ===== */
#warn-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
#warn-overlay.open { display: flex; }
.warn-modal {
  background: var(--bg2);
  border: 1px solid var(--sep);
  border-top: 3px solid var(--conf-t);
  border-radius: 10px;
  padding: 24px 28px;
  width: 380px;
  max-width: 95vw;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
}
.warn-modal-icon { font-size: 28px; text-align: center; }
.warn-modal-title { font-size: 14px; font-weight: 700; color: var(--conf-t); text-align: center; }
.warn-modal-msg { font-size: 12px; color: var(--text2); text-align: center; line-height: 1.6; }
.warn-modal-footer { display: flex; justify-content: center; }
.warn-modal-footer button {
  background: var(--conf-bg);
  border: 1.5px solid #7a1a1a;
  color: var(--conf-t);
  border-radius: 6px;
  padding: 7px 28px;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
}
.warn-modal-footer button:hover { background: #5a1010; }
#toast {
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--bg2);
  border: 1px solid var(--sep);
  border-left: 3px solid var(--acc);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 12px;
  color: var(--text);
  z-index: 300;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.err  { border-left-color: var(--conf-t); }

/* ===== SPINNER ===== */
.spin {
  display: inline-block;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Propagation scores */
.prop-row { display:flex; padding:3px 6px; gap:2px; border-bottom:1px solid var(--sep); background:var(--ibg); }
.prop-item { flex:1; text-align:center; }
.prop-lbl { font-size:9px; color:var(--text2); text-transform:uppercase; letter-spacing:.3px; }
.prop-bar-wrap { height:4px; background:var(--sep); border-radius:2px; margin:2px 4px; overflow:hidden; }
.prop-bar { height:4px; border-radius:2px; transition:width .4s; }
.prop-pct { font-size:10px; font-weight:600; }
.prop-bad  { color:#e05050; }
.prop-ok   { color:#f0a020; }
.prop-good { color:#50d870; }
.prop-ok   { color:#f0c040; }
.prop-good { color:#50d870; }
.prop-loading { font-size:9px; color:var(--text2); text-align:center; padding:4px; }

/* Mode filter checkboxes */
.mode-cb { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text2); cursor:pointer; user-select:none; }
.mode-cb input[type="checkbox"] { width:13px; height:13px; accent-color:var(--acc); cursor:pointer; }
.mode-cb span { font-size:11px; font-weight:500; }

/* Drag and drop — SortableJS */
.card.sortable-ghost  { opacity: .25; }
.card.sortable-chosen { transform: rotate(1deg); box-shadow: 0 8px 24px rgba(0,0,0,.5); }

/* Row gap between grid rows — sin elementos DOM separadores */
#grid { row-gap: 8px; }

/* ===== ROTOR WIDGET ===== */
#rotor-widget {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--ibg);
  border: 1.5px solid var(--card-bdr);
  border-radius: 10px;
  padding: 6px 14px;
  flex-shrink: 0;
}
#rotor-widget.offline {
  border-color: var(--sep);
  opacity: .6;
}
.rotor-compass { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
.rotor-compass svg { width: 56px; height: 56px; }
.rotor-needle { transition: all .05s linear; }
.rotor-info { display: flex; flex-direction: column; gap: 2px; }
.rotor-az {
  font-size: 20px; font-weight: 700;
  color: var(--utc);
  font-family: 'Courier New', monospace;
  min-width: 54px;
  line-height: 1;
}
.rotor-status { font-size: 11px; color: var(--work-t); line-height: 1; }
.rotor-status.moving  { color: var(--utc); }
.rotor-status.offline { color: var(--conf-t); }
.rotor-stop-btn {
  background: var(--conf-bg);
  border: 1.5px solid #7a1a1a;
  color: var(--conf-t);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .15s;
}
.rotor-stop-btn:hover { background: #5a1010; }

/* ===== BAND FILTER BAR ===== */
#bandbar {
  background: var(--bg3);
  border-bottom: 2px solid var(--sep);
  padding: 4px 16px;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
#bandbar > label { font-size: 11px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
.band-pill {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--sep); border-radius: 3px;
  padding: 2px 7px; color: var(--text2); background: var(--ibg);
  transition: background .15s, border-color .15s, color .15s;
  user-select: none; flex-shrink: 0;
}
.band-pill input { display: none; }
.band-pill.active { background: var(--acc2); border-color: var(--acc); color: #fff; }

/* SP/LP clickable in cards */
.geo-val.sp, .geo-val.lp {
  cursor: pointer;
  border-radius: 4px;
  padding: 1px 4px;
  transition: background .15s, color .15s;
  display: inline-block;
}
.geo-val.sp:hover { background: rgba(96,176,255,.18); color: #fff; }
.geo-val.lp:hover { background: rgba(240,160,96,.18);  color: #fff; }
.geo-val.sp.rotor-sending { background: rgba(30,139,212,.3); color: #80d4ff; animation: rotorpulse .6s infinite alternate; }
.geo-val.lp.rotor-sending { background: rgba(240,160,64,.3); color: #ffd080; animation: rotorpulse .6s infinite alternate; }
@keyframes rotorpulse { from { opacity:1 } to { opacity:.4 } }

/* Rotor offline — clicks desactivados visualmente */
body.rotor-offline .geo-val.sp,
body.rotor-offline .geo-val.lp {
  cursor: default;
  opacity: .5;
}
</style>
</head>
<body>

<div id="dxspots-popup"></div>

<!-- TOPBAR -->
<div id="topbar">
  <span class="title">📡 DXpedition Tracker</span>
  <div class="clocks">
    <div class="clk">
      <div class="clk-lbl">UTC</div>
      <div class="clk-val utc" id="clk-utc">--:--:--</div>
    </div>
    <div class="clk">
      <div class="clk-lbl">Local</div>
      <div class="clk-val loc" id="clk-loc">--:--:--</div>
    </div>
  </div>
  <div class="spacer"></div>

  <!-- ROTOR WIDGET — centrado -->
  <div id="rotor-widget" class="offline" title="Control de rotor">
    <div class="rotor-compass">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="25" fill="var(--ibg)" stroke="var(--card-bdr)" stroke-width="1.5"/>
        <circle cx="28" cy="28" r="22" fill="none" stroke="var(--sep)" stroke-width=".5" stroke-dasharray="3 4"/>
        <text x="28" y="11"  text-anchor="middle" font-size="8" fill="var(--text2)" font-family="sans-serif" font-weight="700">N</text>
        <text x="28" y="51"  text-anchor="middle" font-size="8" fill="var(--text2)" font-family="sans-serif">S</text>
        <text x="7"  y="31"  text-anchor="middle" font-size="8" fill="var(--text2)" font-family="sans-serif">W</text>
        <text x="49" y="31"  text-anchor="middle" font-size="8" fill="var(--text2)" font-family="sans-serif">E</text>
        <line id="rotor-needle" class="rotor-needle"
              x1="28" y1="28" x2="28" y2="7"
              stroke="var(--utc)" stroke-width="2.5" stroke-linecap="round"/>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────
const ALL_BANDS = ['6','10','12','15','17','20','30','40','80','160'];
const ALL_MODES = ['CW','SSB','FT8','FT4','RTTY'];
let activeModes = []; // loaded from config, default all off
let activeBands = []; // loaded from config, default all HF bands on

let expeditions = [];   // array of expedition objects from API
let propData = {};      // {expId: {sp:{scores}, lp:{scores}, kp, sfi, muf, ...}}
let currentBrowsePath = 'C:\\';
let currentPower = '100W';
let dxCalendarEnabled = false;

// Alias de visualización: sólo número para metros, mantiene 'cm' para centimétrico
function bandLabel(b){ return b.endsWith('cm') ? b : b; }
// Label para las pills del filtro de bandas (con sufijo m)
function bandPillLabel(b){ return b.endsWith('cm') ? b : b+'m'; }

// BANDS activas
function getBands(){ return activeBands; }


// ─── Clock ────────────────────────────────────────────────────────────────
function pad(n){ return n < 10 ? '0'+n : ''+n; }
function tick(){
  const n = new Date();
  document.getElementById('clk-utc').textContent =
    pad(n.getUTCHours())+':'+pad(n.getUTCMinutes())+':'+pad(n.getUTCSeconds());
  document.getElementById('clk-loc').textContent =
    pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
}
tick(); setInterval(tick, 1000);


// ─── Theme ────────────────────────────────────────────────────────────────
function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('dx-theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if(localStorage.getItem('dx-theme') === 'light') document.body.classList.add('light');


// ─── Toast ────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, isErr = false){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

function showWarn(title, msg){
  document.getElementById('warn-title').textContent = title;
  document.getElementById('warn-msg').textContent = msg;
  document.getElementById('warn-overlay').classList.add('open');
}


// ─── API helpers ─────────────────────────────────────────────────────────
async function api(method, path, body){
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if(body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if(!r.ok){
    const err = await r.json().catch(() => ({detail: r.statusText}));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}


// ─── Init ────────────────────────────────────────────────────────────────
async function init(){
  try {
    // Load config
    const cfg = await api('GET', '/api/config');
    document.getElementById('locator-input').value = cfg.locator || '';
    const logType = cfg.log_type || 'hrd_xml';
    const logPath = cfg.log_path || cfg.xml_path || '';
    document.getElementById('xml-path-input').value = logPath;
    if(logPath) currentBrowsePath = logPath;
    const ltSel = document.getElementById('log-type-select');
    if(ltSel) ltSel.value = logType;
    _applyLogTypeUI(logType);

    // Load saved modes (default: SSB, FT8, FT4, RTTY — CW off)
    activeModes = cfg.active_modes || [];
    buildModeFilter();

    // Load saved bands (default: todas las HF)
    activeBands = cfg.active_bands && cfg.active_bands.length
      ? cfg.active_bands
      : ALL_BANDS.slice();
    buildBandFilter();

    // Load DX Calendar toggle
    dxCalendarEnabled = !!cfg.dx_calendar_enabled;
    document.getElementById('dxcal-checkbox').checked = dxCalendarEnabled;

    // Load status
    await refreshStatus();

    // Load expeditions
    expeditions = await api('GET', '/api/expeditions');
    renderGrid();
    _initDragDrop();
    fetchAllProp();
    rotorStartPoll();

    // Sync DX Calendar cards (runs on every dashboard load if enabled)
    if(dxCalendarEnabled){
      syncDxCalendar();
    }
  } catch(e){
    showToast('Error starting: '+e.message, true);
  }
}

async function refreshStatus(){
  try {
    const st = await api('GET', '/api/status');
    const dot = document.getElementById('status-dot');
    const lbl = document.getElementById('status-label');
    const badge = document.getElementById('cty-badge');
    const info  = document.getElementById('cty-info');

    if(st.cty_loaded){
      dot.className = 'status-dot ok';
      lbl.textContent = st.hrd_loaded
        ? `CTY ${st.cty_entity_count} entities · HRD ✓`
        : `CTY ${st.cty_entity_count} entities · HRD not loaded`;
      badge.className = 'cty-badge ok';
      badge.textContent = `✓ ${st.cty_entity_count} entities`;
      info.textContent = st.cty_date ? `Date: ${st.cty_date}` : '';
    } else {
      dot.className = 'status-dot err';
      lbl.textContent = 'CTY unavailable';
      badge.className = 'cty-badge err';
      badge.textContent = '✗ CTY not loaded';
    }
  } catch(e) { /* ignore */ }
}


// ─── Config ──────────────────────────────────────────────────────────────
async function saveConfig(){
  try {
    await api('POST', '/api/config', {
      locator: document.getElementById('locator-input').value.trim(),
    });
    _qthCoords = null; // invalidar cache al cambiar locator
    expeditions = await api('GET', '/api/expeditions');
    renderGrid();
    fetchAllProp(); // recalcular propagación con nuevo locator
  } catch(e){
    showToast('Error saving config: '+e.message, true);
  }
}

async function saveModes(){
  try {
    await api('POST', '/api/config', { active_modes: activeModes });
  } catch(e){
    showToast('Error saving modes: '+e.message, true);
  }
}

async function saveBands(){
  try {
    await api('POST', '/api/config', { active_bands: activeBands });
  } catch(e){
    showToast('Error saving bands: '+e.message, true);
  }
}

async function onDxCalendarToggle(){
  dxCalendarEnabled = document.getElementById('dxcal-checkbox').checked;
  try {
    await api('POST', '/api/config', { dx_calendar_enabled: dxCalendarEnabled });
  } catch(e){
    showToast('Error saving DX Calendar: '+e.message, true);
  }
  if(dxCalendarEnabled){
    syncDxCalendar();
  } else {
    purgeAutoDxCards();
  }
}

async function syncDxCalendar(){
  let active;
  try {
    active = await api('GET', '/api/dxcalendar');
  } catch(e){
    showToast('Error fetching DX Calendar: '+e.message, true);
    return;
  }

  const activeCalls = new Set(active.map(a => a.call.toUpperCase()));

  // Remove auto cards whose DXpedition is no longer active
  const autoExps = expeditions.filter(e => e.source === 'auto');
  for(const exp of autoExps){
    if(!activeCalls.has(exp.call.toUpperCase())){
      try { await api('DELETE', `/api/expeditions/${exp.id}`); } catch(e){}
    }
  }

  // Add cards for active DXpeditions not already present
  const remainingAutoCalls = new Set(
    expeditions.filter(e => e.source === 'auto' && activeCalls.has(e.call.toUpperCase()))
               .map(e => e.call.toUpperCase())
  );
  for(const entry of active){
    if(remainingAutoCalls.has(entry.call.toUpperCase())) continue;
    try {
      await api('POST', '/api/expeditions', { call: entry.call, source: 'auto', end_date: entry.end_date });
    } catch(e){}
  }

  expeditions = await api('GET', '/api/expeditions');

  // Reorder: sort auto cards among themselves by end_date asc (soonest first),
  // keeping manual cards in their existing slots untouched.
  const autoSlots = [];
  expeditions.forEach((e, i) => { if(e.source === 'auto') autoSlots.push(i); });
  if(autoSlots.length > 1){
    const autoSorted = expeditions
      .filter(e => e.source === 'auto')
      .sort((a, b) => (a.end_date || '').localeCompare(b.end_date || ''));
    autoSlots.forEach((idx, i) => { expeditions[idx] = autoSorted[i]; });
    try {
      await api('POST', '/api/expeditions/reorder', { order: expeditions.map(e => e.id) });
    } catch(e){}
  }

  renderGrid();
  fetchAllProp();
}

async function purgeAutoDxCards(){
  const autoExps = expeditions.filter(e => e.source === 'auto');
  for(const exp of autoExps){
    try { await api('DELETE', `/api/expeditions/${exp.id}`); } catch(e){}
  }
  expeditions = await api('GET', '/api/expeditions');
  renderGrid();
}

async function showDxSpots(evt, expId, call){
  const popup = document.getElementById('dxspots-popup');
  const btn = evt.currentTarget;

  if(popup.style.display === 'block' && popup.dataset.expId === expId){
    hideDxSpots();
    return;
  }

  const rect = btn.getBoundingClientRect();
  popup.style.top  = (rect.bottom + 4) + 'px';
  popup.style.left = Math.max(8, rect.right - 340) + 'px';
  popup.dataset.expId = expId;
  popup.innerHTML = `
    <div class="dxspots-hdr">
      <span class="title">DX Spots — ${esc(call)}</span>
      <span class="close" onclick="hideDxSpots()">✕</span>
    </div>
    <div class="dxspots-msg">Loading...</div>`;
  popup.style.display = 'block';

  try {
    const spots = await api('GET', `/api/dxspots?call=${encodeURIComponent(call)}`);
    if(popup.dataset.expId !== expId) return;
    if(!spots.length){
      popup.querySelector('.dxspots-msg').textContent = 'No recent spots';
      return;
    }
    const rows = spots.map(s => `
      <tr>
        <td>${esc(s.time)}</td>
        <td>${s.freq}</td>
        <td>${esc(s.de)}</td>
        <td class="obs">${esc(s.obs)}</td>
      </tr>`).join('');
    popup.innerHTML = `
      <div class="dxspots-hdr">
        <span class="title">DX Spots — ${esc(call)}</span>
        <span class="close" onclick="hideDxSpots()">✕</span>
      </div>
      <table>
        <tr><th>UTC</th><th>MHz</th><th>DE</th><th>Comments</th></tr>
        ${rows}
      </table>`;
  } catch(e){
    if(popup.dataset.expId !== expId) return;
    popup.querySelector('.dxspots-msg').textContent = 'Error fetching spots';
  }
}

function hideDxSpots(){
  const popup = document.getElementById('dxspots-popup');
  popup.style.display = 'none';
  delete popup.dataset.expId;
}

document.addEventListener('click', function(evt){
  const popup = document.getElementById('dxspots-popup');
  if(popup.style.display !== 'block') return;
  if(popup.contains(evt.target)) return;
  if(evt.target.closest && evt.target.closest('.card-dxspots')) return;
  hideDxSpots();
});

async function saveXmlPath(path){
  const logType = document.getElementById('log-type-select')?.value || 'hrd_xml';
  try {
    await api('POST', '/api/config', { xml_path: path, log_path: path, log_type: logType });
    document.getElementById('xml-path-input').value = path;
    currentBrowsePath = path;
    showToast('Log loaded successfully');
    await refreshStatus();
    expeditions = await api('GET', '/api/expeditions');
    renderGrid();
  } catch(e){
    showToast('Error loading log: '+e.message, true);
  }
}

async function reloadXml(){
  const logPath = document.getElementById('xml-path-input').value.trim();
  if(!logPath){
    showWarn('Log no seleccionado',
      'No hay ningún archivo o carpeta de log seleccionado.\n\nUsa el botón 📁 Browse para seleccionar la fuente de log.');
    return;
  }
  try {
    const r = await api('POST', '/api/reload_xml');
    showToast(`Log reloaded — ${r.calls} callsigns`);
    await refreshStatus();
    expeditions = await api('GET', '/api/expeditions');
    renderGrid();
  } catch(e){
    showToast('Error: '+e.message, true);
  }
}


// ─── Expeditions ─────────────────────────────────────────────────────────
async function newExpedition(){
  // Validaciones previas
  const locator = document.getElementById('locator-input').value.trim();
  if(!locator){
    showWarn('Locator requerido',
      'Por favor introduce un locator Maidenhead válido (ej. JN01nq) antes de añadir una DXpedición.\n\nEl locator es necesario para calcular los azimuts SP/LP y la propagación.');
    return;
  }
  const logPath = document.getElementById('xml-path-input').value.trim();
  if(!logPath){
    showWarn('Log no seleccionado',
      'Por favor selecciona el archivo o carpeta del log (HRD XML, MDB, SQLite o ADIF) antes de añadir una DXpedición.\n\nUsa el botón 📁 Browse para seleccionar la fuente de log.');
    return;
  }
  if(expeditions.length >= 10){
    showToast('Maximum 10 DXpeditions', true);
    return;
  }
  const call = prompt('DXpedition callsign:');
  if(!call || !call.trim()) return;
  try {
    const exp = await api('POST', '/api/expeditions', { call: call.trim() });
    expeditions.push(exp);
    renderGrid();
    fetchPropForExp(exp);
    showToast(`${exp.call} added`);
  } catch(e){
    showToast('Error: '+e.message, true);
  }
}

async function deleteExpedition(id){
  if(!confirm('Delete this DXpedition? All data will be removed.')) return;
  try {
    await api('DELETE', `/api/expeditions/${id}`);
    expeditions = expeditions.filter(e => e.id !== id);
    renderGrid();
    showToast('DXpedition deleted');
  } catch(e){
    showToast('Error: '+e.message, true);
  }
}

async function reloadExpedition(id){
  try {
    const updated = await api('POST', `/api/expeditions/${id}/reload`);
    const idx = expeditions.findIndex(e => e.id === id);
    if(idx !== -1) expeditions[idx] = updated;
    renderGrid();
    showToast('Data updated from XML');
  } catch(e){
    showToast('Error: '+e.message, true);
  }
}

async function onCellClick(e, expId, key){
  e.preventDefault();
  try {
    const r = await api('POST', '/api/expeditions/cell', {
      expedition_id: expId,
      key,
      action: 'click',
    });
    // Update local state
    const exp = expeditions.find(e => e.id === expId);
    if(exp) exp.cells[key] = r.cell;
    renderGrid();
  } catch(e){
    // silently ignore non-clickable cells
  }
}

async function onCellRightClick(e, expId, key){
  e.preventDefault();
  try {
    const r = await api('POST', '/api/expeditions/cell', {
      expedition_id: expId,
      key,
      action: 'undo',
    });
    const exp = expeditions.find(e => e.id === expId);
    if(exp) exp.cells[key] = r.cell;
    renderGrid();
  } catch(e){ /* ignore */ }
}


// ─── Render ──────────────────────────────────────────────────────────────
function cellContent(band, st){
  if(st === 'disabled') return '<span style="opacity:.35">—</span>';
  if(st === 'confirmed') return band + '&thinsp;<span class="badge">C</span>';
  if(st === 'worked')    return band + '&thinsp;<span class="badge">W</span>';
  if(st === 'new')       return '<span class="xover">✕</span>' + band;
  return band;
}

function cellClass(st){
  return { confirmed:'s-confirmed', worked:'s-worked', new:'s-new', disabled:'s-disabled' }[st] || 's-empty';
}

function formatDMY(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function buildCard(exp){
  const country = exp.country || '—';
  const zones   = exp.continent
    ? `${exp.continent} · CQ${exp.cq_zone} · ITU${exp.itu_zone}`
    : '';

  const sp   = exp.sp   ? exp.sp + '°'   : '—';
  const lp   = exp.lp   ? exp.lp + '°'   : '—';
  const dist = exp.distance_km ? exp.distance_km.toLocaleString('en') + ' km' : '—';

  let rows = '';
  for(const b of getBands()){
    let tds = '';
    for(const m of activeModes){
      const key = `${b}-${m}`;
      const cell = exp.cells[key] || {s:'empty'};
      const st = cell.s || cell;
      tds += `<td class="${cellClass(st)}"
        onclick="onCellClick(event,'${exp.id}','${key}')"
        oncontextmenu="onCellRightClick(event,'${exp.id}','${key}')"
      >${cellContent(bandLabel(b), st)}</td>`;
    }
    // SP% and LP% propagation columns
    const p = propData[exp.id];
    let spPct = '...', lpPct = '...';
    let spCls = '', lpCls = '';
    if(p && !p.error){
      if(p.sp && p.sp.scores){
        const v = p.sp.scores[b] ?? 0;
        spPct = v + '%';
        spCls = v >= 70 ? 'prop-good' : v >= 40 ? 'prop-ok' : 'prop-bad';
      }
      if(p.lp && p.lp.scores){
        const v = p.lp.scores[b] ?? 0;
        lpPct = v + '%';
        lpCls = v >= 70 ? 'prop-good' : v >= 40 ? 'prop-ok' : 'prop-bad';
      }
    }
    tds += `<td style="background:var(--cell-e)"><span class="${spCls}" style="font-size:11px;font-weight:700">${spPct}</span></td>`;
    tds += `<td style="background:var(--cell-e)"><span class="${lpCls}" style="font-size:11px;font-weight:700">${lpPct}</span></td>`;
    rows += `<tr>${tds}</tr>`;
  }

  return `
<div class="card" id="card-${exp.id}" data-id="${exp.id}">
  <div class="card-hdr">
    <input class="card-call-input" type="text" value="${esc(exp.call)}"
      placeholder="Callsign..."
      onblur="updateCallsign('${exp.id}', this.value)"
      onkeydown="if(event.key==='Enter')this.blur()">
    <button class="card-reload" onclick="reloadExpedition('${exp.id}')" title="Reload from XML">↺</button>
    <button class="card-dxspots" onclick="showDxSpots(event, '${exp.id}', '${esc(exp.call)}')" title="DX Spots">DX</button>
    <button class="card-close"  onclick="deleteExpedition('${exp.id}')" title="Delete">✕</button>
  </div>
  <div class="card-country">
    <span class="cname">${esc(country)}</span>
    ${exp.source === 'auto' && exp.end_date ? `<span class="cname" style="color:var(--text2);font-weight:400;font-size:11px">till ${formatDMY(exp.end_date)}</span>` : ''}
    <span class="czones">${esc(zones)}</span>
  </div>
  <div class="card-geo">
    <div class="geo-item">
      <div class="geo-lbl">SP</div>
      <div class="geo-val sp" onclick="rotorMoveTo(${exp.sp || 0}, this, 'SP')" title="Apuntar rotor SP ${exp.sp || 0}°">${sp}</div>
    </div>
    <div class="geo-item">
      <div class="geo-lbl">LP</div>
      <div class="geo-val lp" onclick="rotorMoveTo(${exp.lp || 0}, this, 'LP')" title="Apuntar rotor LP ${exp.lp || 0}°">${lp}</div>
    </div>
    <div class="geo-item">
      <div class="geo-lbl">Distance</div>
      <div class="geo-val dist">${dist}</div>
    </div>
  </div>
  <table class="dx-table">
    <thead>
      <tr>
        ${activeModes.map(m => `<th>${m}</th>`).join('')}
        <th>SP%</th>
        <th>LP%</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>
</div>`;
}

function renderGrid(){
  const grid = document.getElementById('grid');
  let html = '';

  expeditions.forEach((exp, i) => {
    html += buildCard(exp);
  });

  if(expeditions.length < 10){
    html += `<div class="card-add" onclick="newExpedition()">
      <div class="card-add-icon">＋</div>
      <div class="card-add-lbl">New DXpedition</div>
    </div>`;
  }

  grid.innerHTML = html;
}

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Update callsign when user edits it in the card header
async function updateCallsign(id, newCall){
  newCall = newCall.trim().toUpperCase();
  if(!newCall) return;
  const exp = expeditions.find(e => e.id === id);
  if(!exp || exp.call === newCall) return;

  try {
    // Delete old, create new with same position
    await api('DELETE', `/api/expeditions/${id}`);
    const updated = await api('POST', '/api/expeditions', { call: newCall });
    // Preserve 'new' states from old expedition
    const oldCells = exp.cells || {};
    for(const key of Object.keys(updated.cells)){
      const oldCell = oldCells[key];
      if(oldCell && (oldCell.s === 'new' || oldCell === 'new')){
        // Keep new state, update via API
        await api('POST', '/api/expeditions/cell', {
          expedition_id: updated.id, key, action: 'click'
        }).catch(()=>{});
      }
    }
    const idx = expeditions.findIndex(e => e.id === id);
    expeditions.splice(idx, 1, updated);
    renderGrid();
    showToast(`Callsign updated: ${newCall}`);
  } catch(e){
    showToast('Error updating callsign: '+e.message, true);
    renderGrid(); // restore
  }
}

// ─── Propagation ─────────────────────────────────────────────────────────────
function propClass(pct){
  if(pct >= 65) return 'prop-good';
  if(pct >= 35) return 'prop-ok';
  return 'prop-bad';
}
function propBarColor(pct){
  if(pct >= 65) return '#50d870';
  if(pct >= 35) return '#f0c040';
  return '#e05050';
}

function buildPropBadge(expId, path){
  const p = propData[expId];
  if(!p) return `<div style="font-size:9px;color:var(--text2);margin-top:1px">...</div>`;
  if(p.error) return `<div style="font-size:9px;color:var(--text2);margin-top:1px">N/A</div>`;

  // Best score across all active bands for this path
  const data = path === 'sp' ? p.sp : p.lp;
  if(!data) return '';
  const scores = data.scores || {};
  const vals = BANDS.map(b => scores[b] ?? 0);
  const best = Math.max(...vals);
  const cls = propClass(best);

  return `<div style="font-size:10px;font-weight:600;margin-top:1px" class="${cls}">${best}%</div>`;
}

let _qthCoords = null; // cached QTH coords

function _parseLocator(loc){
  const g = loc.trim().toUpperCase();
  if(g.length < 4) return null;
  // Validate: first 2 letters, next 2 digits, optional 2 letters
  if(!/^[A-R]{2}[0-9]{2}([A-X]{2})?/.test(g)) return null;
  let lon = (g.charCodeAt(0)-65)*20-180 + (g.charCodeAt(2)-48)*2;
  let lat = (g.charCodeAt(1)-65)*10-90  + (g.charCodeAt(3)-48)*1;
  if(g.length >= 6){
    lon += (g.charCodeAt(4)-65)*(2/24) + 1/24;
    lat += (g.charCodeAt(5)-65)*(1/24) + 0.5/24;
  } else { lon += 1.0; lat += 0.5; }
  return {lat, lon};
}

async function getQthCoords(){
  if(_qthCoords) return _qthCoords;
  // 1. Try DOM input first (most up to date)
  const domLoc = document.getElementById('locator-input')?.value || '';
  if(domLoc.length >= 4){
    const c = _parseLocator(domLoc);
    if(c){ _qthCoords = c; return _qthCoords; }
  }
  // 2. Fallback to saved config
  try {
    const cfg = await api('GET', '/api/config');
    const loc = cfg.locator || '';
    if(loc.length >= 4){
      const c = _parseLocator(loc);
      if(c){ _qthCoords = c; return _qthCoords; }
    }
  } catch(e){}
  return null;
}

async function fetchPropForExp(exp){
  if(exp.dx_lat == null || exp.dx_lon == null) return;
  if(exp.dx_lat === 0 && exp.dx_lon === 0) return; // coords no resueltas
  const qth = await getQthCoords();
  if(!qth) return;
  const modesParam = activeModes.join(',') || 'SSB';
  const url = `/api/propagation?lat1=${qth.lat.toFixed(4)}&lon1=${qth.lon.toFixed(4)}&lat2=${exp.dx_lat}&lon2=${exp.dx_lon}&modes=${encodeURIComponent(modesParam)}&power=${currentPower}`;
  try {
    const data = await api('GET', url);
    propData[exp.id] = data;
  } catch(e){
    propData[exp.id] = { error: true };
  }
  renderGrid();
}

async function fetchAllProp(){
  _qthCoords = null; // reset cache on each call
  for(const exp of expeditions){
    fetchPropForExp(exp); // fire and forget — each updates grid when ready
  }
}

function onPowerChange(){
  currentPower = document.getElementById('power-select').value;
  propData = {};
  fetchAllProp();
}

// ─── Mode filter ─────────────────────────────────────────────────────────
function buildModeFilter(){
  const container = document.getElementById('mode-filter');
  container.innerHTML = '';
  ALL_MODES.forEach(m => {
    const checked = activeModes.includes(m) ? 'checked' : '';
    const label = document.createElement('label');
    label.className = 'mode-cb';
    label.innerHTML = `<input type="checkbox" value="${m}" ${checked}><span>${m}</span>`;
    label.querySelector('input').addEventListener('change', function(){
      if(this.checked){
        if(!activeModes.includes(m)) activeModes.push(m);
        // Keep order
        activeModes = ALL_MODES.filter(x => activeModes.includes(x));
      } else {
        activeModes = activeModes.filter(x => x !== m);
      }
      saveModes();
      renderGrid();
    });
    container.appendChild(label);
  });
}

// ─── Band filter ──────────────────────────────────────────────────────────
function buildBandFilter(){
  const container = document.getElementById('bandbar');
  container.innerHTML = '<label>Bands:</label>';
  ALL_BANDS.forEach(b => {
    const isActive = activeBands.includes(b);
    const pill = document.createElement('label');
    pill.className = 'band-pill' + (isActive ? ' active' : '');
    pill.innerHTML = `<input type="checkbox" value="${b}" ${isActive ? 'checked' : ''}><span>${bandPillLabel(b)}</span>`;
    pill.querySelector('input').addEventListener('change', function(){
      if(this.checked){
        if(!activeBands.includes(b)) activeBands.push(b);
        activeBands = ALL_BANDS.filter(x => activeBands.includes(x));
      } else {
        activeBands = activeBands.filter(x => x !== b);
      }
      pill.classList.toggle('active', this.checked);
      saveBands();
      renderGrid();
    });
    container.appendChild(pill);
  });
}

// ─── Drag & drop — SortableJS ────────────────────────────────────────────────
let _sortable = null;

function _initDragDrop(){
  if(typeof Sortable === 'undefined'){ console.error('SortableJS not loaded'); return; }
  const grid = document.getElementById('grid');
  if(_sortable) { _sortable.destroy(); }
  _sortable = Sortable.create(grid, {
    animation: 150,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    // Only drag from header, country row or geo row
    handle: '.card-hdr, .card-country, .card-geo',
    filter: 'button, input',
    onEnd: async function(evt){
      if(evt.oldIndex === evt.newIndex) return;
      // Re-read order from DOM — more reliable than splice with indices
      const cards = document.querySelectorAll('#grid .card[data-id]');
      const newOrder = Array.from(cards).map(c => c.dataset.id).filter(Boolean);
      // Reorder expeditions array to match DOM
      const idToExp = {};
      expeditions.forEach(x => { if(x && x.id) idToExp[x.id] = x; });
      expeditions = newOrder.map(id => idToExp[id]).filter(Boolean);
      try {
        await api('POST', '/api/expeditions/reorder', { order: newOrder });
      } catch(err){
        showToast('Error saving order: '+err.message, true);
      }
    }
  });
}

// ─── Rotor ───────────────────────────────────────────────────────────────
const ROTOR_URL   = 'http://localhost:8767';
const ROTOR_POLL  = 500;    // ms entre lecturas de posición
let rotorOnline   = false;
let rotorAz       = 0;
let rotorPollId   = null;
let rotorSendEl   = null;   // elemento .geo-val activo (el que está girando)

function _rotorNeedle(az){
  const rad = (az - 90) * Math.PI / 180;
  const x2  = 28 + 22 * Math.cos(rad);
  const y2  = 28 + 22 * Math.sin(rad);
  const n = document.getElementById('rotor-needle');
  if(n){
    n.setAttribute('x2', x2.toFixed(2));
    n.setAttribute('y2', y2.toFixed(2));
  }
}

function _rotorSetOnline(online, az, moving){
  const widget = document.getElementById('rotor-widget');
  const azEl   = document.getElementById('rotor-az');
  const stEl   = document.getElementById('rotor-status');
  rotorOnline  = online;

  if(!online){
    widget.className = 'offline';
    azEl.textContent = '---°';
    stEl.textContent = '● Offline';
    stEl.className   = 'rotor-status offline';
    document.body.classList.add('rotor-offline');
    if(rotorSendEl){ rotorSendEl.classList.remove('rotor-sending'); rotorSendEl = null; }
    return;
  }

  widget.className = '';
  document.body.classList.remove('rotor-offline');
  if(az !== null && az !== undefined){
    rotorAz = az;
    azEl.textContent = Math.round(az) + '°';
    _rotorNeedle(az);
  }
  if(moving){
    stEl.textContent = '↻ Girando...';
    stEl.className   = 'rotor-status moving';
  } else {
    stEl.textContent = '● Online';
    stEl.className   = 'rotor-status';
    if(rotorSendEl){ rotorSendEl.classList.remove('rotor-sending'); rotorSendEl = null; }
  }
}

async function _rotorPoll(){
  try {
    const pctrl = new AbortController();
    const ptid  = setTimeout(() => pctrl.abort(), 1800);
    const r = await fetch(ROTOR_URL + '/status', { signal: pctrl.signal });
    clearTimeout(ptid);
    if(!r.ok) throw new Error('bad status');
    const d = await r.json();
    _rotorSetOnline(d.online, d.azimuth, d.moving || false);
  } catch(e){
    _rotorSetOnline(false);
  }
}

function rotorStartPoll(){
  _rotorPoll();
  if(rotorPollId) clearInterval(rotorPollId);
  rotorPollId = setInterval(_rotorPoll, ROTOR_POLL);
}

async function rotorMoveTo(az, el, label){
  if(!az || az <= 0) return;          // sin datos de azimut
  if(!rotorOnline){
    showToast('Rotor offline — no disponible', true);
    return;
  }
  // Marcar elemento como enviando
  if(rotorSendEl && rotorSendEl !== el) rotorSendEl.classList.remove('rotor-sending');
  rotorSendEl = el;
  el.classList.add('rotor-sending');

  try {
    const mctrl = new AbortController();
    const mtid  = setTimeout(() => mctrl.abort(), 3000);
    const r = await fetch(`${ROTOR_URL}/move/${az}`, { method: 'POST', signal: mctrl.signal });
    clearTimeout(mtid);
    const d = await r.json();
    showToast(`Rotor → ${az}° (${label}) · ${d.direction} ${Math.round(d.degrees||0)}°`);
  } catch(e){
    showToast('Error sending rotor command', true);
    el.classList.remove('rotor-sending');
    rotorSendEl = null;
  }
}

async function rotorStop(){
  try {
    const r = await fetch(`${ROTOR_URL}/stop`, { method: 'POST' });
    if(r.ok){
      showToast('Rotor detenido');
      if(rotorSendEl){ rotorSendEl.classList.remove('rotor-sending'); rotorSendEl = null; }
    } else {
      showToast('Error stopping rotor (' + r.status + ')', true);
    }
  } catch(e){ showToast('Error stopping rotor: ' + e.message, true); }
}

// ─── Heartbeat — ping al servidor cada 5s ────────────────────────────────
// Solo se activa si el servidor responde al primer ping (versión Windows exe).
// En Docker /api/heartbeat no existe — primer ping falla y no se activa.
(function startHeartbeat() {
    fetch('/api/heartbeat', { method: 'POST' })
        .then(r => {
            if (r.ok) {
                // Servidor Windows — activar heartbeat periódico
                setInterval(() => {
                    fetch('/api/heartbeat', { method: 'POST' }).catch(() => {});
                }, 5000);
            }
        })
        .catch(() => {}); // Docker o error — no hacer nada
})();

// Intento best-effort al cerrar
window.addEventListener('beforeunload', () => {
    fetch('/api/shutdown', { method: 'POST', keepalive: true }).catch(() => {});
});
